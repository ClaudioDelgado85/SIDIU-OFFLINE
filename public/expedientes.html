<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expedientes - Sistema de Gestión Municipal</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/expedientes.css">
    <link rel="stylesheet" href="css/sistema-v2.css">
</head>

<body class="dashboard page-modulo">
    <!-- Header -->
    <header class="dashboard-header">
        <div>
            <h1>Expedientes</h1>
            <p style="font-size: 14px; opacity: 0.9;">Gestión de expedientes administrativos</p>
        </div>
        <div class="user-info">
            <span class="user-name" id="userName">Cargando...</span>
            <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>
        </div>
    </header>

    <!-- Navegación -->
    <nav class="breadcrumb">
        <a href="dashboard.html">Dashboard</a>
        <span>›</span>
        <span>Expedientes</span>
    </nav>

    <!-- Contenido Principal -->
    <main class="dashboard-main">
        <!-- Barra de acciones -->
        <div class="actions-bar">
            <button class="btn-primary" id="btnNuevo">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
                        clip-rule="evenodd" />
                </svg>
                Nuevo Expediente
            </button>
            <button class="btn-export" id="btnExportar" title="Exportar a Excel">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Exportar
            </button>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar por número, nombre o DNI...">
                <button class="btn-filter" id="btnFiltros">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M3 3a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-.293.707L12 11.414V15a1 1 0 01-.293.707l-2 2A1 1 0 018 17v-5.586L3.293 6.707A1 1 0 013 6V3z"
                            clip-rule="evenodd" />
                    </svg>
                    Filtros
                </button>
            </div>
        </div>

        <!-- Panel de filtros (oculto por defecto) -->
        <div class="filters-panel" id="filtersPanel" style="display: none;">
            <div class="filter-grid">
                <div class="filter-item">
                    <label>Estado</label>
                    <select id="filterEstado">
                        <option value="">Todos</option>
                        <option value="ingreso">Ingresó</option>
                        <option value="en_inspeccion">En inspección</option>
                        <option value="plazo_otorgado">Plazo otorgado</option>
                        <option value="salida">Dio salida</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>Fecha desde</label>
                    <input type="date" id="filterFechaDesde">
                </div>
                <div class="filter-item">
                    <label>Fecha hasta</label>
                    <input type="date" id="filterFechaHasta">
                </div>
                <div class="filter-item">
                    <label>Motivo</label>
                    <select id="filterMotivo">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="filter-item">
                    <button class="btn-secondary" id="btnAplicarFiltros">Aplicar</button>
                    <button class="btn-text" id="btnLimpiarFiltros">Limpiar</button>
                </div>
            </div>
        </div>

        <!-- Estadísticas rápidas -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card stat-primary">
                <div class="stat-value" id="statIngreso">0</div>
                <div class="stat-label">Ingresados</div>
            </div>
            <div class="stat-card stat-warning">
                <div class="stat-value" id="statEnInspeccion">0</div>
                <div class="stat-label">En inspección</div>
            </div>
            <div class="stat-card stat-success">
                <div class="stat-value" id="statSalida">0</div>
                <div class="stat-label">Con salida</div>
            </div>
            <div class="stat-card stat-info">
                <div class="stat-value" id="statPlazoOtorgado">0</div>
                <div class="stat-label">Plazo otorgado</div>
            </div>
        </div>

        <!-- Tabla de expedientes -->
        <div class="table-container">
            <div id="loadingTable" class="loading-state">
                <div class="loader"></div>
                <p>Cargando expedientes...</p>
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <p>No hay expedientes registrados</p>
                <button class="btn-primary" onclick="document.getElementById('btnNuevo').click()">
                    Crear primer expediente
                </button>
            </div>

            <table id="expedientesTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Expediente</th>
                        <th>Fecha</th>
                        <th>Contribuyente</th>
                        <th>Motivo</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="expedientesTableBody">
                    <!-- Datos dinámicos -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="js/export-utils.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/session-manager.js"></script>
    <script src="js/barrios-utils.js"></script>
    <script src="js/catalogos-utils.js"></script>
    <script src="js/expedientes.js"></script>
</body>

</html>
