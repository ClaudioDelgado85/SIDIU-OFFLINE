<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Control - Sistema de Gestión Municipal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/sistema-v2.css">
    <link rel="stylesheet" href="css/dashboard-v2.css">
</head>

<body class="dashboard page-modulo">

    <!-- ═══ HEADER INSTITUCIONAL ═══ -->
    <header class="dashboard-header">
        <div class="header-brand">
            <img src="img/logo_clorinda.jpg" alt="Municipalidad de Clorinda" class="header-logo">
            <div>
                <h1 class="header-title">Centro de Operaciones</h1>
                <p class="header-subtitle">Dirección de Inspección Urbana — Municipalidad de Clorinda</p>
            </div>
        </div>
        <div class="user-info">
            <span class="user-name" id="userName">Usuario</span>
            <button class="btn-logout" id="btnLogout">Salir</button>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="dash-grid">

            <!-- ═══ KPIs ═══ -->
            <section class="dash-kpis">
                <div class="kpi-card kpi-danger" onclick="window.location.href='intimaciones.html'">
                    <div class="kpi-icon-wrap"><svg width="22" height="22" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg></div>
                    <div class="kpi-body">
                        <div class="kpi-value" id="kpiIntVencidas">-</div>
                        <div class="kpi-label">Intimaciones Vencidas</div>
                    </div>
                </div>

                <div class="kpi-card kpi-warning" onclick="window.location.href='intimaciones.html'">
                    <div class="kpi-icon-wrap"><svg width="22" height="22" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg></div>
                    <div class="kpi-body">
                        <div class="kpi-value" id="kpiIntProximas">-</div>
                        <div class="kpi-label">Vencen en ≤ 3 días</div>
                    </div>
                </div>

                <div class="kpi-card kpi-info" onclick="window.location.href='expedientes.html'">
                    <div class="kpi-icon-wrap"><svg width="22" height="22" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg></div>
                    <div class="kpi-body">
                        <div class="kpi-value" id="kpiExpPlazo">-</div>
                        <div class="kpi-label">Expedientes con Plazo</div>
                    </div>
                </div>

                <div class="kpi-card kpi-primary" onclick="window.location.href='reclamos.html'">
                    <div class="kpi-icon-wrap"><svg width="22" height="22" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg></div>
                    <div class="kpi-body">
                        <div class="kpi-value" id="kpiRecPendientes">-</div>
                        <div class="kpi-label">Reclamos Pendientes</div>
                        <div class="kpi-sub" id="kpiRecProceso"></div>
                    </div>
                </div>
            </section>

            <!-- ═══ Tarjetas de Escalamiento ═══ -->
            <section class="esc-cards" id="escalamientoCards">
                <!-- JS renderiza las 3 tarjetas aquí -->
            </section>

            <!-- ═══ Reclamos por Prioridad ═══ -->
            <section class="dash-panel" style="max-width: 100%;">
                <div class="panel-top">
                    <h2 class="panel-title"><span class="dot dot-primary"></span> Reclamos por Prioridad</h2>
                    <a href="reclamos.html" class="panel-link">Ver todos →</a>
                </div>
                <div class="panel-content" id="panelReclamos">
                    <div class="dash-loading">
                        <div class="loader"></div>
                    </div>
                </div>
            </section>

            <!-- ═══ Accesos Rápidos ═══ -->
            <section class="dash-quick-access">
                <a href="busqueda.html" class="qa-btn"><svg width="18" height="18" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg> Búsqueda Global</a>
                <a href="expedientes.html" class="qa-btn"><svg width="18" height="18" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg> Nuevo Expediente</a>
                <a href="informe_diario.html" class="qa-btn qa-highlight"><svg width="18" height="18" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg> Informe Diario</a>
                <a href="tareas_diarias.html" class="qa-btn"><svg width="18" height="18" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg> Tareas Diarias</a>
                <a href="catalogos.html" class="qa-btn"><svg width="18" height="18" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg> Catálogos</a>
            </section>

        </div>
    </main>

    <script src="js/navbar.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
