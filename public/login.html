<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Sistema de Gestión Municipal</title>
    <meta name="description" content="Sistema de Gestión Municipal de la Municipalidad de Clorinda">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        /* ============================================
           LOGIN — Minimalista Elegante
           Paleta Institucional Clorinda
           ============================================ */

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Clorinda Institutional Palette */
            --cl-naranja: #F28C28;
            --cl-naranja-soft: #F9A84D;
            --cl-azul: #2B7CB5;
            --cl-azul-deep: #1E5F8F;
            --cl-celeste: #5CC8D7;
            --cl-celeste-soft: #A8E4EC;
            --cl-amarillo: #F5C542;
            --cl-blanco: #FFFFFF;
            --cl-fondo: #F7F9FC;
            --cl-texto: #1A2B3C;
            --cl-texto-muted: #6B7D8E;
            --cl-borde: rgba(43, 124, 181, 0.12);
            --cl-error: #D14A4A;

            /* Typography */
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
        }

        html {
            height: 100%;
        }

        body {
            font-family: var(--font-body);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--cl-fondo);
            color: var(--cl-texto);
            position: relative;
            overflow: hidden;
        }

        /* === Background Atmosphere === */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            right: -20%;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(92, 200, 215, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -15%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(242, 140, 40, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* === Geometric Accent Decorations === */
        .deco-line {
            position: fixed;
            z-index: 0;
            opacity: 0.07;
        }

        .deco-line--1 {
            top: 12%;
            left: 8%;
            width: 120px;
            height: 3px;
            background: var(--cl-azul);
            transform: rotate(-25deg);
            border-radius: 2px;
        }

        .deco-line--2 {
            bottom: 18%;
            right: 10%;
            width: 80px;
            height: 3px;
            background: var(--cl-naranja);
            transform: rotate(15deg);
            border-radius: 2px;
        }

        .deco-dot {
            position: fixed;
            border-radius: 50%;
            z-index: 0;
            opacity: 0.08;
        }

        .deco-dot--1 {
            top: 22%;
            right: 18%;
            width: 12px;
            height: 12px;
            background: var(--cl-celeste);
        }

        .deco-dot--2 {
            bottom: 28%;
            left: 12%;
            width: 8px;
            height: 8px;
            background: var(--cl-amarillo);
        }

        .deco-dot--3 {
            top: 60%;
            right: 8%;
            width: 6px;
            height: 6px;
            background: var(--cl-naranja);
        }

        /* === Login Card === */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-card__inner {
            background: #fefefe;
            border-radius: 20px;
            padding: 48px 40px 40px;
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.04),
                0 4px 12px rgba(0, 0, 0, 0.04),
                0 16px 40px rgba(43, 124, 181, 0.06);
            border: 1px solid var(--cl-borde);
        }

        /* === Header / Brand === */
        .login-brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-brand__logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 18px;
        }

        @keyframes logoFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        .login-brand__title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--cl-azul-deep);
            line-height: 1.2;
            letter-spacing: -0.01em;
        }

        .login-brand__subtitle {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--cl-texto-muted);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* === Divider === */
        .login-divider {
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    var(--cl-borde) 20%,
                    rgba(242, 140, 40, 0.15) 50%,
                    var(--cl-borde) 80%,
                    transparent);
            margin-bottom: 28px;
        }

        /* === Form === */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-field {
            position: relative;
        }

        .form-field__label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--cl-texto-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }

        .form-field__input {
            width: 100%;
            padding: 14px 16px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--cl-texto);
            background: var(--cl-fondo);
            border: 1.5px solid transparent;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-field__input::placeholder {
            color: var(--cl-texto-muted);
            font-weight: 400;
            opacity: 0.6;
        }

        .form-field__input:hover {
            border-color: var(--cl-borde);
        }

        .form-field__input:focus {
            background: var(--cl-blanco);
            border-color: var(--cl-azul);
            box-shadow: 0 0 0 4px rgba(43, 124, 181, 0.08);
        }

        /* === Error Message === */
        .login-error {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(209, 74, 74, 0.06);
            border: 1px solid rgba(209, 74, 74, 0.15);
            border-radius: 10px;
            color: var(--cl-error);
            font-size: 0.85rem;
            font-weight: 500;
            animation: shakeError 0.4s ease;
        }

        @keyframes shakeError {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            50% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-3px);
            }
        }

        .login-error svg {
            flex-shrink: 0;
        }

        /* === Submit Button === */
        .btn-login {
            position: relative;
            width: 100%;
            padding: 15px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--cl-blanco);
            background: linear-gradient(135deg, var(--cl-naranja) 0%, var(--cl-naranja-soft) 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.35s ease;
            margin-top: 4px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.12),
                    transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow:
                0 4px 12px rgba(242, 140, 40, 0.3),
                0 8px 24px rgba(242, 140, 40, 0.15);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            cursor: not-allowed;
            opacity: 0.7;
            transform: none;
            box-shadow: none;
        }

        /* Loader */
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--cl-blanco);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* === Footer === */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--cl-borde);
        }

        .login-footer__hint {
            font-size: 0.78rem;
            color: var(--cl-texto-muted);
            line-height: 1.6;
        }

        .login-footer__hint strong {
            color: var(--cl-azul);
            font-weight: 600;
        }

        .login-footer__version {
            font-size: 0.7rem;
            color: var(--cl-texto-muted);
            opacity: 0.5;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* === Bottom Accent Bar === */
        .login-accent-bar {
            height: 4px;
            border-radius: 0 0 20px 20px;
            background: linear-gradient(90deg,
                    var(--cl-azul) 0%,
                    var(--cl-celeste) 35%,
                    var(--cl-naranja) 65%,
                    var(--cl-amarillo) 100%);
            margin-top: -1px;
        }

        /* === Responsive === */
        @media (max-width: 480px) {
            .login-card__inner {
                padding: 36px 28px 32px;
                border-radius: 16px;
            }

            .login-brand__logo {
                width: 80px;
                height: 80px;
            }

            .login-brand__title {
                font-size: 1.25rem;
            }

            .login-accent-bar {
                border-radius: 0 0 16px 16px;
            }
        }
    </style>
</head>

<body>

    <!-- Decorative Elements -->
    <div class="deco-line deco-line--1"></div>
    <div class="deco-line deco-line--2"></div>
    <div class="deco-dot deco-dot--1"></div>
    <div class="deco-dot deco-dot--2"></div>
    <div class="deco-dot deco-dot--3"></div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="login-card__inner">
            <!-- Brand -->
            <div class="login-brand">
                <img src="img/logo_clorinda.jpg" alt="Municipalidad de Clorinda" class="login-brand__logo" id="logoImg">
                <h1 class="login-brand__title">Municipalidad de Clorinda</h1>
                <p class="login-brand__subtitle">Sistema de Gestión</p>
            </div>

            <div class="login-divider"></div>

            <!-- Form -->
            <form id="loginForm" class="login-form" autocomplete="on">
                <div class="form-field">
                    <label class="form-field__label" for="usuario">Usuario</label>
                    <input class="form-field__input" type="text" id="usuario" name="usuario" required
                        autocomplete="username" placeholder="Ingrese su usuario">
                </div>

                <div class="form-field">
                    <label class="form-field__label" for="password">Contraseña</label>
                    <input class="form-field__input" type="password" id="password" name="password" required
                        autocomplete="current-password" placeholder="Ingrese su contraseña">
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="login-error">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                            clip-rule="evenodd" />
                    </svg>
                    <span id="errorText"></span>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-login" id="btnLogin">
                    <span id="btnText">Ingresar al Sistema</span>
                    <span id="btnLoader" class="loader"></span>
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p class="login-footer__hint">
                    Usuario: <strong>admin</strong> &nbsp;/&nbsp; Contraseña: <strong>admin123</strong>
                </p>
                <p class="login-footer__version">v1.0.0</p>
            </div>
        </div>

        <!-- Accent Bar -->
        <div class="login-accent-bar"></div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
